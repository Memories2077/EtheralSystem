services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI port
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  docker-manager:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: docker-manager
    user: "0:0" # root to ensure docker.sock usage
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shared_input:/app/input
      - shared_openapi_spec:/app/src-generated-yaml
      - shared_mcpserver_ts:/app/src-generated-ts
    environment:
      - USE_DOCKER_PING=false
      - PUBLIC_URL=https://mcp.hi-mcp.xyz
      - MONGO_URI=mongodb://mongodb:27017
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=production
      - PORT=8080
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: my-proxy
    ports:
      - "8081:8081"
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-host.docker.internal}
      - MONGO_URI=mongodb://mongodb:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-manager
      - mongodb
      - rabbitmq
    restart: unless-stopped

volumes:
  mongodb_data:
  rabbitmq_data:
  shared_input:
    driver: local
    name: shared_input
  shared_openapi_spec:
    driver: local
    name: shared_openapi_spec
  shared_mcpserver_ts:
    driver: local
    name: shared_mcpserver_ts
