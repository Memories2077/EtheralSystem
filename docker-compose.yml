services:
  # =========================================================================
  # Infrastructure
  # =========================================================================
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - etheral-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - etheral-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb-server
    ports:
      - "8025:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - etheral-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - etheral-network

  # =========================================================================
  # MCP Gen
  # =========================================================================
  docker-manager:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp-gen-manager
    container_name: docker-manager
    user: "0:0"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./reports/jsonplaceholder-ui-metrics:/repo/reports/jsonplaceholder-ui-metrics
      - jwt_data:/repo/apps/mcp-gen/data
      - shared_input:/repo/apps/mcp-gen/input
      - shared_openapi_spec:/repo/apps/mcp-gen/src-generated-yaml
      - shared_mcpserver_ts:/repo/apps/mcp-gen/src-generated-ts
    environment:
      - USE_DOCKER_PING=false
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:8081}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - NODE_ENV=production
      - PORT=8080
      - MANAGER_URL=${MANAGER_URL:-http://docker-manager:8080}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9002}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - METACLAW_API_KEY=${METACLAW_API_KEY:-}
      - METACLAW_ENABLED=${METACLAW_ENABLED:-false}
      - METACLAW_BASE_URL=${METACLAW_BASE_URL:-http://host.docker.internal:30000/v1}
      - METACLAW_MODEL=${METACLAW_MODEL:-qwen/qwen3-next-80b-a3b-instruct}
      - MCP_NETWORK=${MCP_NETWORK:-etheralsystem_etheral-network}
      - MCP_SHARED_INPUT_VOLUME=${MCP_SHARED_INPUT_VOLUME:-etheralsystem_shared_input}
      - MCP_SHARED_OPENAPI_SPEC_VOLUME=${MCP_SHARED_OPENAPI_SPEC_VOLUME:-etheralsystem_shared_openapi_spec}
      - MCP_SHARED_MCPSERVER_TS_VOLUME=${MCP_SHARED_MCPSERVER_TS_VOLUME:-etheralsystem_shared_mcpserver_ts}
      - DEFAULT_MCP_IMAGE=${DEFAULT_MCP_IMAGE:-etheralsystem-docker-manager}
      - SKILL_FEEDBACK_ENABLED=${SKILL_FEEDBACK_ENABLED:-true}
      - DYNAMIC_SKILL_SELECTION=${DYNAMIC_SKILL_SELECTION:-false}
      - SKILL_SELECTION_VARIANT=${SKILL_SELECTION_VARIANT:-dynamic}
      - RESEARCH_METRICS_ENABLED=${RESEARCH_METRICS_ENABLED:-false}
      - RESEARCH_EXPERIMENT_ID=${RESEARCH_EXPERIMENT_ID:-local-dev}
      - RESEARCH_EVENTS_DB=${RESEARCH_EVENTS_DB:-docker}
      - RESEARCH_EVENTS_COLLECTION=${RESEARCH_EVENTS_COLLECTION:-research_events}
      - RESEARCH_EVENTS_JSONL_PATH=${RESEARCH_EVENTS_JSONL_PATH:-/tmp/etheral-research-events.jsonl}
      - RESEARCH_EVENTS_JSONL_MIRROR=${RESEARCH_EVENTS_JSONL_MIRROR:-false}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/repo/apps/mcp-gen/data/persistence.json"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - etheral-network

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp-gen-proxy
    container_name: my-proxy
    ports:
      - "8081:8081"
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-host.docker.internal}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - RESEARCH_METRICS_ENABLED=${RESEARCH_METRICS_ENABLED:-false}
      - RESEARCH_EXPERIMENT_ID=${RESEARCH_EXPERIMENT_ID:-local-dev}
      - RESEARCH_EVENTS_DB=${RESEARCH_EVENTS_DB:-docker}
      - RESEARCH_EVENTS_COLLECTION=${RESEARCH_EVENTS_COLLECTION:-research_events}
      - RESEARCH_EVENTS_JSONL_PATH=${RESEARCH_EVENTS_JSONL_PATH:-/tmp/etheral-research-events.jsonl}
      - RESEARCH_EVENTS_JSONL_MIRROR=${RESEARCH_EVENTS_JSONL_MIRROR:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - jwt_data:/repo/apps/mcp-gen/data
      - ./reports/jsonplaceholder-ui-metrics:/repo/reports/jsonplaceholder-ui-metrics
    depends_on:
      docker-manager:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - etheral-network

  # =========================================================================
  # LangGraph Agent
  # =========================================================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    container_name: agent-service
    ports:
      - "2024:2024"
    volumes:
      - ./reports/jsonplaceholder-ui-metrics:/repo/reports/jsonplaceholder-ui-metrics
    environment:
      - CHROMA_HOST=chromadb-server
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama-server:11434
      - MCP_BASE_URL=${MCP_BASE_URL:-http://docker-manager:8080/api}
      - MCP_MANAGER_URL=${MCP_MANAGER_URL:-http://docker-manager:8080}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - METACLAW_API_KEY=${METACLAW_API_KEY:-}
      - METACLAW_ENABLED=${METACLAW_ENABLED:-false}
      - METACLAW_BASE_URL=${METACLAW_BASE_URL:-http://host.docker.internal:30000/v1}
      - METACLAW_MODEL=${METACLAW_MODEL:-qwen/qwen3-next-80b-a3b-instruct}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-default}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - RESEARCH_METRICS_ENABLED=${RESEARCH_METRICS_ENABLED:-false}
      - RESEARCH_EXPERIMENT_ID=${RESEARCH_EXPERIMENT_ID:-local-dev}
      - RESEARCH_EVENTS_DB=${RESEARCH_EVENTS_DB:-docker}
      - RESEARCH_EVENTS_COLLECTION=${RESEARCH_EVENTS_COLLECTION:-research_events}
      - RESEARCH_EVENTS_JSONL_PATH=${RESEARCH_EVENTS_JSONL_PATH:-/tmp/etheral-research-events.jsonl}
      - RESEARCH_EVENTS_JSONL_MIRROR=${RESEARCH_EVENTS_JSONL_MIRROR:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - ollama
      - docker-manager
    restart: unless-stopped
    networks:
      - etheral-network

  # =========================================================================
  # Chatbot
  # =========================================================================
  chatbot-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: chatbot-backend
    container_name: chatbot-backend
    volumes:
      - ./reports/jsonplaceholder-ui-metrics:/repo/reports/jsonplaceholder-ui-metrics
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - METACLAW_API_KEY=${METACLAW_API_KEY:-}
      - METACLAW_ENABLED=${METACLAW_ENABLED:-false}
      - METACLAW_BASE_URL=${METACLAW_BASE_URL:-http://host.docker.internal:30000/v1}
      - METACLAW_MODEL=${METACLAW_MODEL:-qwen/qwen3-next-80b-a3b-instruct}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - PYTHONUNBUFFERED=1
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-8000}
      - LANGGRAPH_API_URL=${LANGGRAPH_API_URL:-http://agent-service:2024}
      - MCP_GEN_URL=${MCP_GEN_URL:-http://docker-manager:8080}
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - RESEARCH_METRICS_ENABLED=${RESEARCH_METRICS_ENABLED:-false}
      - RESEARCH_EXPERIMENT_ID=${RESEARCH_EXPERIMENT_ID:-local-dev}
      - RESEARCH_EVENTS_DB=${RESEARCH_EVENTS_DB:-docker}
      - RESEARCH_EVENTS_COLLECTION=${RESEARCH_EVENTS_COLLECTION:-research_events}
      - RESEARCH_EVENTS_JSONL_PATH=${RESEARCH_EVENTS_JSONL_PATH:-/tmp/etheral-research-events.jsonl}
      - RESEARCH_EVENTS_JSONL_MIRROR=${RESEARCH_EVENTS_JSONL_MIRROR:-false}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import requests,sys; r=requests.get(''http://localhost:${BACKEND_PORT:-8000}/health''); sys.exit(0 if 200 <= r.status_code < 400 else 1)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      docker-manager:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - etheral-network

  chatbot-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: chatbot-frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
        - NEXT_PUBLIC_RESEARCH_EXPERIMENT_ID=${NEXT_PUBLIC_RESEARCH_EXPERIMENT_ID:-${RESEARCH_EXPERIMENT_ID:-local-dev}}
    container_name: chatbot-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
      - NEXT_PUBLIC_RESEARCH_EXPERIMENT_ID=${NEXT_PUBLIC_RESEARCH_EXPERIMENT_ID:-${RESEARCH_EXPERIMENT_ID:-local-dev}}
      - NODE_ENV=production
    ports:
      - "9002:9002"
    depends_on:
      chatbot-backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "const r=await fetch(''http://localhost:9002''); process.exit(r.ok?0:1)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - etheral-network

volumes:
  mongodb_data:
  rabbitmq_data:
  chromadb_data:
  ollama_data:
  jwt_data:
  shared_input:
  shared_openapi_spec:
  shared_mcpserver_ts:

networks:
  etheral-network:
    driver: bridge
